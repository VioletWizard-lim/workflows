name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 실행
  workflow_dispatch:         # 수동 실행 버튼도 생성

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          curl -I -L --max-time 30 "https://YOUR-APP-URL.streamlit.app" || true
