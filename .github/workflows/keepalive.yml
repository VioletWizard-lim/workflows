name: Keep Streamlit App Awake

on:
  schedule:
    # Every 5 minutes, offset from :00 to avoid top-of-hour congestion
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-alive-streamlit
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Validate target URL
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          set -euo pipefail

          if [ -z "${STREAMLIT_APP_URL:-}" ]; then
            echo "::error::STREAMLIT_APP_URL secret is not set."
            echo "Set Repository secret STREAMLIT_APP_URL to your app URL (e.g. https://your-app.streamlit.app)."
            exit 1
          fi

          case "$STREAMLIT_APP_URL" in
            http://*|https://*)
              ;;
            *)
              echo "::error::STREAMLIT_APP_URL must start with http:// or https://."
              exit 1
              ;;
          esac

      - name: Ping Streamlit app and detect sleep page
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          set -euo pipefail

          BODY_FILE=$(mktemp)
          echo "Pinging: $STREAMLIT_APP_URL"

          HTTP_CODE=$(curl -sS -L --retry 3 --retry-all-errors --max-time 30 \
            -A "Mozilla/5.0 (compatible; streamlit-keepalive/1.0; +https://github.com/${{ github.repository }})" \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            -o "$BODY_FILE" -w "%{http_code}" \
            "$STREAMLIT_APP_URL")
          CURL_EXIT=$?

          echo "Keep-alive ping response HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 500 ]; then
            echo "::error::Server returned HTTP $HTTP_CODE"
            exit 1
          fi

          if grep -qi "This app has gone to sleep due to inactivity" "$BODY_FILE"; then
            echo "::error::Sleep page detected. Automated request reached Streamlit's sleep interstitial instead of a live app."
            echo "Streamlit may require a manual wake-up or a different external monitor endpoint."
            exit 1
          fi

          echo "Ping completed (service reachable and not on sleep interstitial)."
