name: Keep Streamlit App Awake

on:
  schedule:
    # Every 5 minutes, offset from :00 to avoid top-of-hour congestion
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-alive-streamlit
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Validate target URL
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$STREAMLIT_APP_URL" ]; then
            echo "STREAMLIT_APP_URL secret is not set. Skipping keep-alive ping."
            exit 0
          fi

      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          set +e
          echo "Pinging: $STREAMLIT_APP_URL"

          HTTP_CODE=$(curl -L --retry 3 --retry-all-errors --max-time 30 \
            -A "github-actions-keepalive/1.0" \
            -o /dev/null -w "%{http_code}" \
            "$STREAMLIT_APP_URL")
          CURL_EXIT=$?

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "Keep-alive ping warning: curl exited with code $CURL_EXIT."
            echo "This run will not fail to avoid noisy alert emails."
            exit 0
          fi

          echo "Keep-alive ping response HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
            echo "Ping completed (service reachable)."
            exit 0
          fi

          echo "Keep-alive ping warning: HTTP $HTTP_CODE"
          echo "This run will not fail to avoid noisy alert emails."
          exit 0
