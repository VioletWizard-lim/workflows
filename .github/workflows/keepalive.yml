name: Keep Streamlit App Awake (Empty Commit)

on:
  schedule:
    # 12시간마다 한 번씩 실행 (Streamlit의 12~24시간 수면 주기 방어)
    - cron: "0 */12 * * *"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 커밋을 푸시하기 위한 쓰기 권한
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create empty commit
        run: |
          # 봇 이름으로 Git 계정 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 내용이 없는 빈 커밋 생성 (에러 방지를 위해 allow-empty 옵션 사용)
          git commit --allow-empty -m "chore: keep streamlit app awake"
          
          # GitHub으로 푸시
          git push
